name: Bot CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "dev/**"
      - "cursor/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run pip-audit
        # pipx is pre-installed on ubuntu-latest runners; avoids adding pip-audit to requirements.txt.
        # Fails on any known CVE (pip-audit has no --severity flag; all reported vulns are actionable).
        # Scope: production dependencies only (requirements.txt). Dev/CI tools are excluded.
        run: pipx run pip-audit -r requirements.txt --format=json --output pip-audit-report.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN is used for checkout. Do not require INNERSYNC_TOKEN here:
          # an empty or revoked PAT breaks all PR CI with "could not read Username for 'https://github.com'".
          # If private submodules are added later, set submodules + a dedicated secret only where needed.

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install diff-cover

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright, advisory)
        continue-on-error: true
        run: npx pyright

      - name: Run tests (baseline gate)
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=24
        env:
          PYTHONPATH: .

      - name: Enforce diff coverage (no regression on changed lines)
        run: |
          git fetch origin main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=45
