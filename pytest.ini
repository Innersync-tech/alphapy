[pytest]
# Repo-root imports (utils, cogs, gpt). CI also sets PYTHONPATH=. in bot.yml.
pythonpath = .
testpaths = tests
addopts = -q --maxfail=1 --disable-warnings --cov=utils --cov=api --cov-report=term-missing
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:coroutine .* was never awaited:RuntimeWarning
